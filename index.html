<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班級點餐系統</title>
  
  <!-- 載入 Tailwind CSS (負責畫面排版與美化) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React 與 ReactDOM (負責網頁互動邏輯) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 載入 Babel (讓瀏覽器能看懂 React 語法) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 隱藏外層多餘卷軸但保留滑動功能 */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 自訂卡片內部的優雅捲軸 */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* 淡入動畫 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }
  </style>
</head>
<body class="bg-slate-50">
  <!-- React 應用程式的掛載點 -->
  <div id="root"></div>

  <!-- 系統核心邏輯 -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 圖示元件 (全內建，不依賴外部圖示庫) ---
    const Settings = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
    const ClipboardList = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg>;
    const PieChart = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>;
    const Plus = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
    const Trash2 = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
    const Upload = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
    const Check = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
    const AlertCircle = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;
    const Loader2 = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
    const Utensils = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>;

    function App() {
      const [activeTab, setActiveTab] = useState('setup');
      const [apiKey, setApiKey] = useState(localStorage.getItem('geminiApiKey') || '');
      
      // --- 產生預設的班級名單 (101~608) ---
      const generateClassList = () => {
        const list = [];
        for (let grade = 1; grade <= 6; grade++) {
          for (let cls = 1; cls <= 8; cls++) {
            list.push(`${grade}0${cls}`);
          }
        }
        return list;
      };
      const defaultClasses = generateClassList();
      
      // State: Setup (預設帶入 101~608 班級名單)
      const [studentInput, setStudentInput] = useState(defaultClasses.join('\n'));
      const [students, setStudents] = useState(defaultClasses);
      const [menuItems, setMenuItems] = useState([
        { id: '1', category: '麵食類', name: '肉麻麵 (細麵)', price: 65 },
        { id: '2', category: '麵食類', name: '肉麻麵 (意麵)', price: 65 },
        { id: '3', category: '飲品', name: '紅茶', price: 25 },
        { id: '4', category: '水餃類', name: '高麗菜水餃', price: 60 },
        { id: '5', category: '小菜', name: '燙青菜', price: 40 }
      ]);
      const [isParsingMenu, setIsParsingMenu] = useState(false);
      const [menuError, setMenuError] = useState('');
      
      // State: Ordering
      const [currentStudent, setCurrentStudent] = useState('');
      const [orders, setOrders] = useState({}); // { studentName: { itemId: quantity } }
      const [currentCart, setCurrentCart] = useState({});

      const handleApiKeyChange = (e) => {
        setApiKey(e.target.value);
        localStorage.setItem('geminiApiKey', e.target.value);
      };

      // 處理學生名單輸入
      const handleStudentInputChange = (e) => {
        setStudentInput(e.target.value);
        const parsedStudents = e.target.value
          .split('\n')
          .map(s => s.trim())
          .filter(s => s !== '');
        setStudents(parsedStudents);
      };

      // 手動新增菜單品項
      const addMenuItem = (category = '未分類') => {
        setMenuItems([...menuItems, { id: Date.now().toString(), category, name: '', price: 0 }]);
      };

      // 批次更新分類名稱
      const updateCategoryName = (oldCategory, newCategory) => {
        const trimmedNew = newCategory.trim() || '未分類';
        if (oldCategory === trimmedNew) return;
        setMenuItems(prev => prev.map(item => 
          (item.category || '未分類') === oldCategory ? { ...item, category: trimmedNew } : item
        ));
      };

      // 更新單一菜單品項
      const updateMenuItem = (id, field, value) => {
        setMenuItems(menuItems.map(item => 
          item.id === id ? { ...item, [field]: field === 'price' ? Number(value) : value } : item
        ));
      };

      // 刪除菜單品項
      const removeMenuItem = (id) => {
        setMenuItems(menuItems.filter(item => item.id !== id));
      };

      // 處理圖片上傳與 Gemini API 辨識
      const handleImageUpload = async (e) => {
        if (!apiKey) {
          setMenuError("請先在上方填寫 Gemini API Key 才能使用 AI 辨識功能！");
          return;
        }

        const file = e.target.files[0];
        if (!file) return;

        setIsParsingMenu(true);
        setMenuError('');

        const reader = new FileReader();
        
        reader.onload = async () => {
          try {
            const base64Image = reader.result.split(',')[1];
            
            const prompt = `你是一個專業的資料擷取助理。請從這張菜單圖片中，擷取所有的「餐點名稱」、「價格」以及它們所屬的「大分類」。
            請注意：菜單上的大分類通常會以「較大的字體」、「粗體」、「不同顏色（例如紅色）」或獨立一行的形式呈現（例如：麵食類、水餃類、來點小菜、飲品等）。
            請嚴格回傳一個 JSON 陣列格式，陣列中的每個物件都必須包含 'category' (字串，若無明顯分類請填寫"未分類")、'name' (字串) 和 'price' (數字) 三個屬性。
            不要包含任何其他解釋文字或 Markdown 標記，只要純 JSON。
            範例：[{"category": "飯麵類", "name": "排骨飯", "price": 90}, {"category": "飲品", "name": "珍奶", "price": 50}]`;

            const payload = {
              contents: [{
                role: "user",
                parts: [
                  { text: prompt },
                  { inlineData: { mimeType: file.type, data: base64Image } }
                ]
              }],
              generationConfig: {
                responseMimeType: "application/json"
              }
            };

            // 使用穩定的正式版模型
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });

            const result = await response.json();
            
            if (result.error) {
              throw new Error(result.error.message || 'API 呼叫失敗，請檢查 API Key 是否正確。');
            }

            const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
            
            if (text) {
              try {
                const parsedItems = JSON.parse(text);
                const newMenuItems = parsedItems.map((item, index) => ({
                  id: Date.now().toString() + index,
                  category: item.category || '未分類',
                  name: item.name,
                  price: item.price
                }));
                setMenuItems(prev => [...prev, ...newMenuItems]);
              } catch (parseError) {
                console.error("JSON 解析失敗:", text);
                setMenuError("無法解析菜單內容，請確認圖片是否清晰或嘗試手動輸入。");
              }
            } else {
              setMenuError("AI 未回傳任何內容，請再試一次。");
            }
          } catch (error) {
            console.error("處理圖片時發生錯誤:", error);
            if (error.message.includes("has not been used in project") || error.message.includes("is disabled")) {
              setMenuError("您的 API Key 尚未啟用 Generative Language API。請至 Google Cloud Console 啟用，或直接到 Google AI Studio 免費申請一把新的 Key。");
            } else {
              setMenuError(error.message || "處理圖片時發生錯誤，請稍後再試。");
            }
          } finally {
            setIsParsingMenu(false);
          }
        };

        reader.onerror = () => {
          setMenuError("圖片讀取失敗，請再試一次。");
          setIsParsingMenu(false);
        };
        
        reader.readAsDataURL(file);
        e.target.value = null; // 清空選擇檔案，允許重複上傳同一張
      };

      // 選擇學生進行點餐
      const handleSelectStudent = (studentName) => {
        setCurrentStudent(studentName);
        setCurrentCart(orders[studentName] || {});
      };

      // 修改購物車數量
      const updateCart = (itemId, delta) => {
        setCurrentCart(prev => {
          const currentQty = prev[itemId] || 0;
          const newQty = Math.max(0, currentQty + delta);
          
          const newCart = { ...prev };
          if (newQty === 0) {
            delete newCart[itemId];
          } else {
            newCart[itemId] = newQty;
          }
          return newCart;
        });
      };

      // 儲存學生訂單
      const saveOrder = () => {
        if (!currentStudent) return;
        setOrders({
          ...orders,
          [currentStudent]: currentCart
        });
        alert(`${currentStudent} 的點餐已儲存！`);
        setCurrentStudent('');
        setCurrentCart({});
      };

      // 計算特定學生的總金額
      const calculateStudentTotal = (studentOrders) => {
        if (!studentOrders) return 0;
        return Object.entries(studentOrders).reduce((total, [itemId, qty]) => {
          const item = menuItems.find(m => m.id === itemId);
          return total + (item ? item.price * qty : 0);
        }, 0);
      };

      // 計算店家總單與總金額
      const getAggregatedOrder = () => {
        const itemTotals = {};
        let grandTotal = 0;

        Object.values(orders).forEach(studentCart => {
          Object.entries(studentCart).forEach(([itemId, qty]) => {
            if (!itemTotals[itemId]) {
              itemTotals[itemId] = 0;
            }
            itemTotals[itemId] += qty;
            
            const item = menuItems.find(m => m.id === itemId);
            if (item) {
              grandTotal += item.price * qty;
            }
          });
        });

        return { itemTotals, grandTotal };
      };

      const { itemTotals, grandTotal } = getAggregatedOrder();

      // Setup 專用的群組化
      const setupGroupedMenu = menuItems.reduce((acc, item) => {
        const cat = item.category || '未分類';
        if (!acc[cat]) acc[cat] = [];
        acc[cat].push(item);
        return acc;
      }, {});

      // 點餐專用的群組化
      const groupedMenu = menuItems.reduce((acc, item) => {
        if (item.name.trim() === '') return acc;
        const cat = item.category || '未分類';
        if (!acc[cat]) acc[cat] = [];
        acc[cat].push(item);
        return acc;
      }, {});

      return (
        <div className="min-h-screen text-slate-800 font-sans pb-20">
          {/* 頂部導航列 */}
          <header className="bg-indigo-600 text-white shadow-md sticky top-0 z-10">
            <div className="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <Utensils className="w-6 h-6" />
                <h1 className="text-xl font-bold">班級點餐系統</h1>
              </div>
            </div>
            
            {/* 標籤頁切換 */}
            <div className="max-w-4xl mx-auto flex px-2 overflow-x-auto hide-scrollbar">
              <button 
                onClick={() => setActiveTab('setup')}
                className={`flex-1 py-3 px-4 flex items-center justify-center gap-2 border-b-4 transition-colors whitespace-nowrap ${activeTab === 'setup' ? 'border-white text-white font-semibold' : 'border-transparent text-indigo-200 hover:text-white'}`}
              >
                <Settings className="w-5 h-5" />
                <span>1. 系統設定</span>
              </button>
              <button 
                onClick={() => setActiveTab('order')}
                className={`flex-1 py-3 px-4 flex items-center justify-center gap-2 border-b-4 transition-colors whitespace-nowrap ${activeTab === 'order' ? 'border-white text-white font-semibold' : 'border-transparent text-indigo-200 hover:text-white'}`}
              >
                <ClipboardList className="w-5 h-5" />
                <span>2. 進行點餐</span>
              </button>
              <button 
                onClick={() => setActiveTab('summary')}
                className={`flex-1 py-3 px-4 flex items-center justify-center gap-2 border-b-4 transition-colors whitespace-nowrap ${activeTab === 'summary' ? 'border-white text-white font-semibold' : 'border-transparent text-indigo-200 hover:text-white'}`}
              >
                <PieChart className="w-5 h-5" />
                <span>3. 結帳統計</span>
              </button>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-4 py-6">
            
            {/* =========================================
                Tab 1: 系統設定
               ========================================= */}
            {activeTab === 'setup' && (
              <div className="space-y-6 animate-fade-in">
                
                {/* API Key 設定 */}
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                  <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
                    <span className="bg-indigo-100 text-indigo-700 w-8 h-8 rounded-full flex items-center justify-center text-sm">🔑</span>
                    AI 金鑰設定 (AI 辨識必填)
                  </h2>
                  <p className="text-sm text-slate-500 mb-3">若要使用 AI 自動上傳菜單功能，請填寫您的 Google Gemini API Key。（金鑰僅會保存在您目前的瀏覽器中）</p>
                  <input 
                    type="password" 
                    value={apiKey}
                    onChange={handleApiKeyChange}
                    placeholder="在此貼上您的 API Key..."
                    className="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"
                  />
                </div>

                {/* 學生名單設定 */}
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                  <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
                    <span className="bg-indigo-100 text-indigo-700 w-8 h-8 rounded-full flex items-center justify-center text-sm">A</span>
                    建立班級/學生名單
                  </h2>
                  <p className="text-sm text-slate-500 mb-3">系統已自動為您產生 101~608 的班級名單。您也可以在下方自由修改，每行一筆。</p>
                  <textarea 
                    className="w-full h-32 p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow outline-none resize-y"
                    value={studentInput}
                    onChange={handleStudentInputChange}
                    placeholder="101&#10;102&#10;103"
                  />
                  <div className="mt-2 text-sm text-emerald-600 flex items-center gap-1">
                    <Check className="w-4 h-4" />
                    已成功載入 {students.length} 筆名單
                  </div>
                </div>

                {/* 菜單設定 (群組化顯示) */}
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                  <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
                    <span className="bg-indigo-100 text-indigo-700 w-8 h-8 rounded-full flex items-center justify-center text-sm">B</span>
                    建立菜單品項 (分類群組版)
                  </h2>
                  
                  {/* AI 上傳區塊 */}
                  <div className="mb-6 p-4 border-2 border-dashed border-indigo-200 rounded-xl bg-indigo-50/50">
                    <p className="text-sm font-semibold text-indigo-800 mb-2">✨ 懶得打字？使用 AI 讀取菜單！</p>
                    <p className="text-xs text-slate-600 mb-4">上傳包含品項、價格與分類的菜單圖片，系統會自動幫您轉換至下方清單。</p>
                    <label className="flex items-center justify-center w-full p-3 bg-white border border-indigo-200 text-indigo-600 rounded-lg cursor-pointer hover:bg-indigo-50 transition-colors shadow-sm">
                      {isParsingMenu ? (
                        <><Loader2 className="w-5 h-5 mr-2 animate-spin" /> 正在辨識菜單中，請稍候...</>
                      ) : (
                        <><Upload className="w-5 h-5 mr-2" /> 選擇菜單圖片上傳</>
                      )}
                      <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} disabled={isParsingMenu} />
                    </label>
                    {menuError && (
                      <div className="mt-3 text-sm text-red-500 flex items-center gap-1">
                        <AlertCircle className="w-4 h-4" /> {menuError}
                      </div>
                    )}
                  </div>

                  {/* ★★★ 雙欄網格佈局 (Grid) - 系統設定頁面 ★★★ */}
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {Object.entries(setupGroupedMenu).map(([category, items]) => (
                      <div key={category} className="border border-slate-200 rounded-xl bg-white shadow-sm flex flex-col h-[380px]">
                        
                        {/* 分類標頭 (固定頂部) */}
                        <div className="bg-indigo-50/50 p-3 border-b border-slate-200 flex items-center gap-3 shrink-0 rounded-t-xl">
                          <span className="font-bold text-indigo-800 whitespace-nowrap">分類：</span>
                          <input
                            type="text"
                            defaultValue={category}
                            onBlur={(e) => updateCategoryName(category, e.target.value)}
                            className="bg-white border border-indigo-200 rounded-lg px-2 py-1 focus:ring-2 focus:ring-indigo-500 outline-none text-indigo-900 font-semibold w-full"
                            placeholder="輸入分類"
                          />
                        </div>

                        {/* 該分類底下的所有品項 (獨立捲軸區塊) */}
                        <div className="p-3 space-y-3 flex-1 overflow-y-auto custom-scrollbar">
                          <div className="flex font-semibold text-slate-400 text-xs px-1">
                            <div className="flex-1">餐點名稱</div>
                            <div className="w-20 text-right pr-2">價格($)</div>
                            <div className="w-8"></div>
                          </div>
                          
                          {items.map((item) => (
                            <div key={item.id} className="flex items-center gap-2 group">
                              <input 
                                type="text" 
                                value={item.name}
                                onChange={(e) => updateMenuItem(item.id, 'name', e.target.value)}
                                placeholder="例:滷肉飯"
                                className="flex-1 p-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm"
                              />
                              <input 
                                type="number" 
                                value={item.price}
                                onChange={(e) => updateMenuItem(item.id, 'price', e.target.value)}
                                min="0"
                                className="w-20 p-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-right text-sm"
                              />
                              <button 
                                onClick={() => removeMenuItem(item.id)}
                                className="p-1.5 text-slate-400 hover:text-red-500 transition-colors rounded-lg hover:bg-red-50"
                                title="刪除"
                              >
                                <Trash2 className="w-4 h-4" />
                              </button>
                            </div>
                          ))}
                        </div>
                        
                        {/* 新增按鈕 (固定底部) */}
                        <div className="p-3 border-t border-slate-100 bg-slate-50 shrink-0 rounded-b-xl">
                          <button 
                            onClick={() => addMenuItem(category)}
                            className="w-full py-2 border border-dashed border-slate-300 text-slate-500 rounded-lg hover:border-indigo-400 hover:text-indigo-600 transition-colors flex items-center justify-center gap-2 text-sm"
                          >
                            <Plus className="w-4 h-4" /> 新增 {category} 品項
                          </button>
                        </div>

                      </div>
                    ))}
                    
                    {/* 建立全新分類卡片 */}
                    <div className="border-2 border-dashed border-indigo-200 rounded-xl flex items-center justify-center h-[380px] bg-indigo-50/30 hover:bg-indigo-50 transition-colors cursor-pointer" onClick={() => addMenuItem('新分類')}>
                      <div className="text-indigo-500 font-semibold flex flex-col items-center gap-2">
                        <div className="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm text-indigo-600">
                          <Plus className="w-6 h-6" />
                        </div>
                        <span>建立新分類</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* =========================================
                Tab 2: 進行點餐
               ========================================= */}
            {activeTab === 'order' && (
              <div className="space-y-6 animate-fade-in">
                {students.length === 0 ? (
                  <div className="text-center p-10 bg-white rounded-2xl shadow-sm border border-slate-100">
                    <AlertCircle className="w-12 h-12 text-amber-400 mx-auto mb-3" />
                    <h3 className="text-lg font-bold text-slate-700">還沒有學生名單</h3>
                    <p className="text-slate-500 mt-1">請先到「系統設定」建立名單後再開始點餐。</p>
                    <button onClick={() => setActiveTab('setup')} className="mt-4 px-4 py-2 bg-indigo-100 text-indigo-700 rounded-lg hover:bg-indigo-200">去設定</button>
                  </div>
                ) : menuItems.length === 0 || menuItems.every(m => !m.name) ? (
                  <div className="text-center p-10 bg-white rounded-2xl shadow-sm border border-slate-100">
                    <Utensils className="w-12 h-12 text-amber-400 mx-auto mb-3" />
                    <h3 className="text-lg font-bold text-slate-700">菜單是空的</h3>
                    <p className="text-slate-500 mt-1">請先到「系統設定」建立菜單後再開始點餐。</p>
                    <button onClick={() => setActiveTab('setup')} className="mt-4 px-4 py-2 bg-indigo-100 text-indigo-700 rounded-lg hover:bg-indigo-200">去設定</button>
                  </div>
                ) : (
                  <>
                    {/* 步驟 1：選擇學生 */}
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                      <h2 className="text-lg font-bold mb-4">1. 選擇點餐班級/學生</h2>
                      <select 
                        className="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none bg-slate-50 text-lg"
                        value={currentStudent}
                        onChange={(e) => handleSelectStudent(e.target.value)}
                      >
                        <option value="" disabled>-- 請選擇班級/名字 --</option>
                        {students.map(student => (
                          <option key={student} value={student}>
                            {student} {orders[student] ? ' (已點餐 ✅)' : ''}
                          </option>
                        ))}
                      </select>
                    </div>

                    {/* 步驟 2：選擇餐點 */}
                    {currentStudent && (
                      <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 animate-fade-in">
                        <h2 className="text-lg font-bold mb-6 pb-3 border-b border-slate-100 flex flex-col sm:flex-row justify-between sm:items-center gap-3">
                          <span>2. 選擇餐點</span>
                          <span className="text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-full text-sm font-semibold inline-block">
                            目前身分：{currentStudent}
                          </span>
                        </h2>
                        
                        {/* ★★★ 雙欄網格佈局 (Grid) - 點餐頁面 ★★★ */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                          {Object.entries(groupedMenu).map(([category, items]) => (
                            <div key={category} className="border border-slate-200 rounded-xl flex flex-col max-h-[420px] shadow-sm bg-slate-50/50">
                              
                              {/* 分類標頭 */}
                              <div className="bg-white p-3 border-b border-slate-200 shrink-0 rounded-t-xl">
                                <h3 className="text-md font-bold text-indigo-800 flex items-center gap-2">
                                  <span className="w-2 h-2 rounded-full bg-indigo-500"></span>
                                  {category}
                                </h3>
                              </div>
                              
                              {/* 品項列表 (獨立捲軸區塊) */}
                              <div className="p-3 space-y-3 overflow-y-auto flex-1 custom-scrollbar">
                                {items.map(item => {
                                  const qty = currentCart[item.id] || 0;
                                  return (
                                    <div key={item.id} className={`flex items-center justify-between p-3 rounded-xl border transition-all ${qty > 0 ? 'border-indigo-400 bg-indigo-50/50 shadow-sm' : 'border-slate-200 bg-white'}`}>
                                      <div className="pr-2">
                                        <div className="font-semibold text-slate-800 text-base">{item.name}</div>
                                        <div className="text-slate-500 text-sm">${item.price}</div>
                                      </div>
                                      
                                      <div className="flex items-center gap-2 bg-white p-1 rounded-lg border border-slate-200 shadow-sm shrink-0">
                                        <button 
                                          onClick={() => updateCart(item.id, -1)}
                                          className={`w-8 h-8 flex items-center justify-center rounded-md transition-colors ${qty > 0 ? 'text-slate-700 hover:bg-slate-100' : 'text-slate-300 cursor-not-allowed'}`}
                                          disabled={qty === 0}
                                        >
                                          -
                                        </button>
                                        <span className="w-6 text-center font-bold text-base text-indigo-700">{qty}</span>
                                        <button 
                                          onClick={() => updateCart(item.id, 1)}
                                          className="w-8 h-8 flex items-center justify-center rounded-md text-indigo-600 hover:bg-indigo-50 transition-colors font-bold text-lg"
                                        >
                                          +
                                        </button>
                                      </div>
                                    </div>
                                  );
                                })}
                              </div>

                            </div>
                          ))}
                        </div>

                        {/* 購物車總計與送出 */}
                        <div className="mt-8 pt-6 border-t border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                          <div className="text-lg bg-rose-50 px-4 py-2 rounded-xl border border-rose-100 w-full sm:w-auto text-center">
                            <span className="text-rose-600 font-medium">當前總計：</span>
                            <span className="text-2xl font-black text-rose-600 ml-2">${calculateStudentTotal(currentCart)}</span>
                          </div>
                          <button 
                            onClick={saveOrder}
                            disabled={Object.keys(currentCart).length === 0}
                            className={`w-full sm:w-auto px-10 py-3 rounded-xl font-bold text-lg transition-all shadow-sm ${Object.keys(currentCart).length > 0 ? 'bg-indigo-600 text-white hover:bg-indigo-700 hover:shadow-md hover:-translate-y-0.5' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}
                          >
                            確認並送出訂單
                          </button>
                        </div>
                      </div>
                    )}
                  </>
                )}
              </div>
            )}

            {/* =========================================
                Tab 3: 結帳統計
               ========================================= */}
            {activeTab === 'summary' && (
              <div className="space-y-6 animate-fade-in">
                
                {/* 區塊 1：店家總單 */}
                <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                  <div className="bg-amber-50 p-4 border-b border-amber-100 flex items-center gap-2">
                    <Utensils className="w-5 h-5 text-amber-600" />
                    <h2 className="text-lg font-bold text-amber-800">店家總單（跟店家點餐用）</h2>
                  </div>
                  <div className="p-0">
                    {Object.keys(itemTotals).length === 0 ? (
                      <p className="p-6 text-center text-slate-400">目前還沒有人點餐</p>
                    ) : (
                      <table className="w-full text-left">
                        <thead className="bg-slate-50 text-slate-500 text-sm">
                          <tr>
                            <th className="p-4 font-medium">品項名稱</th>
                            <th className="p-4 font-medium text-center">總數量</th>
                            <th className="p-4 font-medium text-right">小計</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                          {Object.entries(itemTotals).map(([itemId, qty]) => {
                            const item = menuItems.find(m => m.id === itemId);
                            if (!item) return null;
                            return (
                              <tr key={itemId} className="hover:bg-slate-50/50">
                                <td className="p-4 font-medium text-slate-800">{item.name}</td>
                                <td className="p-4 text-center font-bold text-indigo-600">{qty}</td>
                                <td className="p-4 text-right text-slate-600">${item.price * qty}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                        <tfoot className="bg-slate-50">
                          <tr>
                            <td colSpan="2" className="p-4 text-right font-bold text-slate-600">應付店家總計：</td>
                            <td className="p-4 text-right font-black text-rose-600 text-xl">${grandTotal}</td>
                          </tr>
                        </tfoot>
                      </table>
                    )}
                  </div>
                </div>

                {/* 區塊 2：各班/個人帳單 */}
                <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                  <div className="bg-indigo-50 p-4 border-b border-indigo-100 flex items-center gap-2">
                    <PieChart className="w-5 h-5 text-indigo-600" />
                    <h2 className="text-lg font-bold text-indigo-800">各班/個人帳單（方便收錢）</h2>
                  </div>
                  <div className="p-0">
                     {Object.keys(orders).length === 0 ? (
                      <p className="p-6 text-center text-slate-400">目前還沒有人點餐</p>
                    ) : (
                      <table className="w-full text-left">
                        <thead className="bg-slate-50 text-slate-500 text-sm">
                          <tr>
                            <th className="p-4 font-medium">班級/姓名</th>
                            <th className="p-4 font-medium">點餐內容</th>
                            <th className="p-4 font-medium text-right">應收金額</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                          {students.map(student => {
                            const studentOrder = orders[student];
                            if (!studentOrder) return null;

                            const total = calculateStudentTotal(studentOrder);
                            const orderDetails = Object.entries(studentOrder)
                              .map(([itemId, qty]) => {
                                const item = menuItems.find(m => m.id === itemId);
                                return item ? `${item.name} x${qty}` : '';
                              })
                              .filter(Boolean)
                              .join('、');

                            return (
                              <tr key={student} className="hover:bg-slate-50/50">
                                <td className="p-4 font-bold text-slate-800">{student}</td>
                                <td className="p-4 text-slate-600 text-sm">{orderDetails}</td>
                                <td className="p-4 text-right font-bold text-rose-500">${total}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    )}
                  </div>
                </div>

              </div>
            )}

          </main>
        </div>
      );
    }

    // 將 React 元件掛載到 HTML 標籤上
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
